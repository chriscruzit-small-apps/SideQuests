<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pip-Boy 3000 Mark IV</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pip-green: #20ff85;
            --pip-green-dim: rgba(32, 255, 133, 0.15);
            --pip-green-bg: rgba(32, 255, 133, 0.05);
            --bg-color: #020502;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--pip-green);
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 0;
            text-transform: uppercase;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* CRT Effect Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100;
            background-size: 100% 3px, 2px 100%;
            pointer-events: none;
        }

        /* LOGIN SCREEN - FIXED SPACING */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px; /* This creates uniform space between all items */
            padding: 20px;
            text-align: center;
        }

        #login-screen h1 {
            letter-spacing: 8px;
            margin: 0;
            font-size: 2.5rem;
            text-shadow: 0 0 10px var(--pip-green-dim);
        }

        #vaultKeyInput {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--pip-green);
            color: var(--pip-green);
            font-family: 'VT323', monospace;
            font-size: 1.8rem;
            text-align: center;
            outline: none;
            padding: 10px;
            width: 100%;
            max-width: 300px;
        }

        /* HEADER STYLING */
        header { padding: 10px 20px 0 20px; }

        .top-nav {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            border-bottom: 2px solid var(--pip-green);
            height: 40px;
            position: relative;
        }

        .top-nav::before, .top-nav::after {
            content: ""; position: absolute; bottom: 0; width: 2px; height: 10px; background: var(--pip-green);
        }
        .top-nav::before { left: 0; }
        .top-nav::after { right: 0; }

        .nav-item { padding: 0 15px 5px 15px; font-size: 1.5rem; color: var(--pip-green); opacity: 0.8; text-decoration: none; }
        .nav-item.active {
            opacity: 1; border: 2px solid var(--pip-green); border-bottom: 2px solid var(--bg-color);
            margin-bottom: -2px; background: var(--bg-color); border-radius: 5px 5px 0 0; position: relative; z-index: 2;
        }

        .nav-item.lr { font-size: 1rem; border: 1px solid var(--pip-green); border-radius: 4px; padding: 0 5px; margin-bottom: 8px; opacity: 0.5; }

        .sub-nav { display: flex; justify-content: center; gap: 30px; padding: 10px 0; font-size: 1.2rem; }
        .sub-nav span.active { font-size: 1.6rem; margin-top: -4px; }

        /* MAIN CONTENT */
        main { flex: 1; overflow-y: auto; padding: 0 40px; display: flex; flex-direction: column; }

        .input-container {
            display: flex; gap: 10px; margin-bottom: 20px; padding: 10px; border: 1px solid var(--pip-green-dim);
        }

        .main-input {
            background: transparent; border: none; border-bottom: 1px solid var(--pip-green-dim);
            color: var(--pip-green); font-family: 'VT323', monospace; font-size: 1.4rem; outline: none; padding: 5px;
        }

        .add-btn {
            background: var(--pip-green); color: black; border: none; font-family: 'VT323', monospace;
            font-weight: bold; padding: 10px 25px; cursor: pointer; font-size: 1.2rem;
        }

        .quest-list { list-style: none; padding: 0; margin: 0; }

        .quest-item {
            padding: 8px 10px; font-size: 1.6rem; cursor: pointer; display: flex; justify-content: space-between;
        }

        .quest-item.active-selection { background: var(--pip-green); color: black; }
        .quest-item.completed { opacity: 0.3; text-decoration: line-through; }

        /* FOOTER STYLING */
        footer {
            display: flex; height: 40px; border-top: 2px solid var(--pip-green); margin: 10px 20px 10px 20px; position: relative;
        }

        footer::before, footer::after {
            content: ""; position: absolute; top: 0; width: 2px; height: 10px; background: var(--pip-green);
        }
        footer::before { left: 0; }
        footer::after { right: 0; }

        .footer-section { flex: 1; display: flex; align-items: center; padding: 0 15px; font-size: 1.2rem; border-right: 2px solid var(--pip-green-dim); }
        .footer-section:last-child { border-right: none; }

        @media (max-width: 600px) {
            main { padding: 0 15px; }
            .nav-item { padding: 0 8px; font-size: 1.1rem; }
            .lr { display: none; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>VAULT-TEC OS</h1>
    <p style="margin: 0; opacity: 0.7;">V3.0.1 - AUTHENTICATION REQUIRED</p>
    <input type="password" id="vaultKeyInput" placeholder="ENTER VAULT KEY">
    <button class="add-btn" onclick="accessVault()">ACCESS VAULT</button>
</div>

<div id="app-screen" style="display:none; flex-direction: column; height: 100%;">
    <header>
        <div class="top-nav">
            <span class="nav-item lr">LT</span>
            <span class="nav-item">STAT</span>
            <span class="nav-item">INV</span>
            <span class="nav-item active">DATA</span>
            <span class="nav-item">MAP</span>
            <span class="nav-item">RADIO</span>
            <span class="nav-item lr">RT</span>
        </div>
        <div class="sub-nav">
            <span class="active">QUESTS</span>
            <span style="opacity: 0.4;">WORKSHOPS</span>
            <span style="opacity: 0.4;">STATS</span>
        </div>
    </header>

    <main>
        <div class="input-container">
            <input type="text" id="questInput" class="main-input" placeholder="NEW SIDE QUEST..." style="flex: 3;">
            <input type="text" id="rewardInput" class="main-input" placeholder="XP" style="flex: 1;">
            <button class="add-btn" onclick="addQuest()">ADD</button>
        </div>
        <div id="questList" class="quest-list"></div>
        <div style="text-align: center; padding: 20px; opacity: 0.5; font-size: 1.5rem;">︾</div>
    </main>

    <footer>
        <div class="footer-section" id="footer-date">06.12.2288</div>
        <div class="footer-section" id="footer-time">03:27 AM</div>
        <div class="footer-section">
            <div style="width: 100%; height: 10px; border: 1px solid var(--pip-green-dim);">
                <div style="width: 85%; height: 100%; background: var(--pip-green-dim);"></div>
            </div>
        </div>
    </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
	  apiKey: "AIzaSyDPtxLIPFSS42bM5M3xBTi2icL-PV0pUFc",
	  authDomain: "sidequests-361b3.firebaseapp.com",
	  projectId: "sidequests-361b3",
	  storageBucket: "sidequests-361b3.firebasestorage.app",
	  messagingSenderId: "256430926601",
	  appId: "1:256430926601:web:04cfdcd465e949de8081d8",
	  measurementId: "G-4PY1QD9LR5"
	};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    let currentVault = localStorage.getItem('vaultKey');

    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const dateStr = `${now.getMonth()+1}.${now.getDate()}.${now.getFullYear() + 200}`;
        document.getElementById('footer-time').innerText = timeStr;
        document.getElementById('footer-date').innerText = dateStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    auth.onAuthStateChanged((user) => {
        if (user && currentVault) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            loadQuests();
        }
    });

    async function accessVault() {
        const key = document.getElementById('vaultKeyInput').value.trim().toLowerCase();
        if (!key) return;
        await auth.signInAnonymously();
        localStorage.setItem('vaultKey', key);
        currentVault = key;
        location.reload();
    }

    function loadQuests() {
        db.collection("vaults").doc(currentVault).collection("sidequests")
            .orderBy("createdAt", "desc")
            .onSnapshot((snapshot) => {
                const listDiv = document.getElementById('questList');
                listDiv.innerHTML = '';
                snapshot.forEach((doc) => {
                    const q = doc.data();
                    const item = document.createElement('div');
                    item.className = `quest-item ${q.completed ? 'completed' : ''}`;
                    item.innerHTML = `<span>${q.title}</span><span>${q.reward ? q.reward + ' XP' : ''}</span>`;
                    item.onclick = () => {
                        document.querySelectorAll('.quest-item').forEach(el => el.classList.remove('active-selection'));
                        item.classList.add('active-selection');
                        setTimeout(() => toggleQuest(doc.id, q.completed), 150);
                    };
                    item.oncontextmenu = (e) => { e.preventDefault(); deleteQuest(doc.id); };
                    listDiv.appendChild(item);
                });
            });
    }

    async function addQuest() {
        const t = document.getElementById('questInput');
        const r = document.getElementById('rewardInput');
        if (!t.value) return;
        await db.collection("vaults").doc(currentVault).collection("sidequests").add({
            title: t.value,
            reward: r.value,
            completed: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        t.value = ''; r.value = '';
    }

    async function toggleQuest(id, status) {
        await db.collection("vaults").doc(currentVault).collection("sidequests").doc(id).update({ completed: !status });
    }

    async function deleteQuest(id) {
        if(confirm("ABANDON QUEST?")) await db.collection("vaults").doc(currentVault).collection("sidequests").doc(id).delete();
    }
</script>
</body>
</html>
