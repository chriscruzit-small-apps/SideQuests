<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pip-Boy</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pip-green: #20ff85;
            --pip-green-dim: rgba(32, 255, 133, 0.2);
            --pip-green-bg: rgba(32, 255, 133, 0.05);
            --bg-color: #020502;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--pip-green);
            font-family: 'VT323', monospace;
            margin: 0; padding: 0;
            text-transform: uppercase;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* CRT Effect */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 3px, 2px 100%; pointer-events: none;
        }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color);
            z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; padding: 20px;
        }

        #vaultKeyInput {
            background: transparent; border: none; border-bottom: 2px solid var(--pip-green);
            color: var(--pip-green); font-family: 'VT323', monospace; font-size: 1.8rem; text-align: center; outline: none; width: 100%; max-width: 280px;
        }

        /* HEADER */
        header { padding: 10px 15px 0 15px; }
        .top-nav { display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 2px solid var(--pip-green); height: 35px; position: relative; }
        .top-nav::before, .top-nav::after { content: ""; position: absolute; bottom: 0; width: 2px; height: 8px; background: var(--pip-green); }
        .top-nav::before { left: 0; } .top-nav::after { right: 0; }
        .nav-item { padding: 0 10px 3px 10px; font-size: 1.2rem; color: var(--pip-green); opacity: 0.6; }
        .nav-item.active { opacity: 1; border: 2px solid var(--pip-green); border-bottom: 2px solid var(--bg-color); margin-bottom: -2px; background: var(--bg-color); border-radius: 5px 5px 0 0; z-index: 2; }
        .sub-nav { display: flex; justify-content: center; gap: 20px; padding: 8px 0; font-size: 1rem; }
        .sub-nav span.active { font-size: 1.3rem; margin-top: -3px; }

        /* MAIN */
        main { flex: 1; overflow-y: auto; padding: 0 15px; display: flex; flex-direction: column; }
        .input-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding: 10px; border: 1px solid var(--pip-green-dim); }
        .main-input { background: transparent; border: none; border-bottom: 1px solid var(--pip-green-dim); color: var(--pip-green); font-family: 'VT323', monospace; font-size: 1.5rem; outline: none; padding: 8px; width: 100%; }
        .add-btn { background: var(--pip-green); color: black; border: none; font-family: 'VT323', monospace; font-weight: bold; padding: 12px; cursor: pointer; font-size: 1.2rem; width: 100%; }

        /* QUEST LIST */
        .quest-item { 
            padding: 12px 10px; font-size: 1.5rem; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--pip-green-bg); 
        }
        .quest-item.completed { opacity: 0.3; text-decoration: line-through; }
        
        .quest-actions { display: flex; align-items: center; gap: 15px; }
        .xp-label { color: #ffce00; font-size: 0.9rem; }
        
        /* DELETE BUTTON [X] */
        .del-btn { 
            color: var(--pip-green); border: 1px solid var(--pip-green); 
            padding: 2px 8px; font-size: 1rem; background: transparent;
            font-family: 'VT323'; cursor: pointer;
        }
        .del-btn:hover { background: red; color: white; border-color: red; }

        /* FOOTER */
        footer { display: flex; height: 40px; border-top: 2px solid var(--pip-green); margin: 5px 15px 10px 15px; position: relative; }
        footer::before, footer::after { content: ""; position: absolute; top: 0; width: 2px; height: 8px; background: var(--pip-green); }
        footer::before { left: 0; } footer::after { right: 0; }
        .footer-section { flex: 1; display: flex; align-items: center; padding: 0 10px; font-size: 1rem; border-right: 1px solid var(--pip-green-dim); }
        .footer-section:last-child { border-right: none; flex: 1.5; }
        
        .xp-bar-container { width: 100%; height: 12px; border: 1px solid var(--pip-green-dim); position: relative; overflow: hidden; }
        #xp-bar-fill { height: 100%; background: var(--pip-green); width: 0%; transition: width 0.5s ease-in-out; }

        #level-up-alert {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--pip-green); color: black; padding: 20px 40px; font-size: 3rem; font-weight: bold;
            z-index: 1000; border: 4px solid white; box-shadow: 0 0 20px var(--pip-green);
        }

        @media screen and (max-height: 550px) { footer, .sub-nav { display: none; } }
        @media (min-width: 400px) { .input-container { flex-direction: row; } .add-btn { width: auto; } }
    </style>
</head>
<body>

<div id="level-up-alert">LEVEL UP!</div>

<div id="login-screen">
    <h1>VAULT-TEC OS</h1>
    <input type="password" id="vaultKeyInput" placeholder="ENTER VAULT KEY">
    <button class="add-btn" onclick="accessVault()" style="max-width: 280px;">ACCESS VAULT</button>
</div>

<div id="app-screen" style="display:none; flex-direction: column; height: 100%;">
    <header>
        <div class="top-nav">
            <span class="nav-item">STAT</span><span class="nav-item">INV</span>
            <span class="nav-item active">DATA</span><span class="nav-item">MAP</span><span class="nav-item">RADIO</span>
        </div>
        <div class="sub-nav"><span class="active">QUESTS</span><span style="opacity: 0.4;">WORKSHOPS</span></div>
    </header>

    <main>
        <div class="input-container">
            <input type="text" id="questInput" class="main-input" placeholder="NEW SIDE QUEST..." autocomplete="off">
            <div style="display: flex; gap: 10px; width: 100%;">
                <input type="number" id="rewardInput" class="main-input" placeholder="XP" style="flex: 1;">
                <button class="add-btn" onclick="addQuest()" style="flex: 1;">ADD</button>
            </div>
        </div>
        <div id="questList"></div>
    </main>

    <footer>
        <div class="footer-section" id="footer-level">LVL 1</div>
        <div class="footer-section" id="footer-xp-text">0/200 XP</div>
        <div class="footer-section">
            <div class="xp-bar-container"><div id="xp-bar-fill"></div></div>
        </div>
    </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
	  apiKey: "AIzaSyDPtxLIPFSS42bM5M3xBTi2icL-PV0pUFc",
	  authDomain: "sidequests-361b3.firebaseapp.com",
	  projectId: "sidequests-361b3",
	  storageBucket: "sidequests-361b3.firebasestorage.app",
	  messagingSenderId: "256430926601",
	  appId: "1:256430926601:web:04cfdcd465e949de8081d8",
	  measurementId: "G-4PY1QD9LR5"
	};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    let currentVault = localStorage.getItem('vaultKey');
    let lastKnownLevel = null;

    function getLevelInfo(totalXP) {
        const a = 37.5, b = 87.5, c = -(125 + totalXP);
        const level = Math.floor((-b + Math.sqrt(b * b - 4 * a * c)) / (2 * a));
        const currentLevelXP = 37.5 * Math.pow(level, 2) + 87.5 * level - 125;
        const nextLevelXP = 37.5 * Math.pow(level + 1, 2) + 87.5 * (level + 1) - 125;
        const xpInLevel = totalXP - currentLevelXP;
        const xpRequiredForNext = nextLevelXP - currentLevelXP;
        return { level, xpInLevel, xpRequiredForNext, progressPercent: (xpInLevel / xpRequiredForNext) * 100 };
    }

    auth.onAuthStateChanged((user) => {
        if (user && currentVault) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            syncStats();
            loadQuests();
        }
    });

    async function accessVault() {
        const key = document.getElementById('vaultKeyInput').value.trim().toLowerCase();
        if (!key) return;
        await auth.signInAnonymously();
        localStorage.setItem('vaultKey', key);
        currentVault = key;
        location.reload();
    }

    function syncStats() {
        db.collection("vaults").doc(currentVault).onSnapshot((doc) => {
            const data = doc.data() || { totalXP: 0 };
            const info = getLevelInfo(data.totalXP || 0);
            document.getElementById('footer-level').innerText = `LVL ${info.level}`;
            document.getElementById('footer-xp-text').innerText = `${Math.floor(info.xpInLevel)}/${Math.floor(info.xpRequiredForNext)} XP`;
            document.getElementById('xp-bar-fill').style.width = `${info.progressPercent}%`;
            if (lastKnownLevel !== null && info.level > lastKnownLevel) triggerLevelUp();
            lastKnownLevel = info.level;
        });
    }

    function triggerLevelUp() {
        const alert = document.getElementById('level-up-alert');
        alert.style.display = 'block';
        setTimeout(() => alert.style.display = 'none', 3000);
    }

    function loadQuests() {
        db.collection("vaults").doc(currentVault).collection("sidequests").orderBy("createdAt", "desc")
            .onSnapshot((snapshot) => {
                const listDiv = document.getElementById('questList');
                listDiv.innerHTML = '';
                snapshot.forEach((doc) => {
                    const q = doc.data();
                    const item = document.createElement('div');
                    item.className = `quest-item ${q.completed ? 'completed' : ''}`;
                    item.innerHTML = `
                        <span onclick="toggleQuest('${doc.id}', ${q.completed}, ${q.reward})">${q.title}</span>
                        <div class="quest-actions">
                            <span class="xp-label">${q.reward} XP</span>
                            <button class="del-btn" onclick="deleteQuest('${doc.id}')">X</button>
                        </div>
                    `;
                    listDiv.appendChild(item);
                });
            });
    }

    async function addQuest() {
        const t = document.getElementById('questInput'), r = document.getElementById('rewardInput');
        if (!t.value) return;
        await db.collection("vaults").doc(currentVault).collection("sidequests").add({
            title: t.value, reward: parseInt(r.value) || 0, completed: false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        t.value = ''; r.value = '';
    }

    async function toggleQuest(id, status, reward) {
        const newStatus = !status;
        const numericReward = Number(reward) || 0;
        await db.collection("vaults").doc(currentVault).collection("sidequests").doc(id).update({ completed: newStatus });
        const xpChange = newStatus ? numericReward : -numericReward;
        await db.collection("vaults").doc(currentVault).set({
            totalXP: firebase.firestore.FieldValue.increment(xpChange)
        }, { merge: true });
    }

    async function deleteQuest(id) {
        if(confirm("ABANDON QUEST?")) {
            await db.collection("vaults").doc(currentVault).collection("sidequests").doc(id).delete();
        }
    }
</script>
</body>
</html>
